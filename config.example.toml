# Ixel MAT — Agent Configuration
# Copy to ~/.config/ixel-mat/config.toml and customize
# Secrets: use env vars, never paste tokens here

# ── WebSocket agents (via OpenClaw gateway) ───────────────────────
[agents.jose]
type = "websocket"
url = "ws://127.0.0.1:18789"
token_env = "IXELMAT_GATEWAY_TOKEN"
session_key = "agent:main:main"
label = "Main Agent (OpenClaw)"
color = "cyan"

[agents.hermes]
type = "websocket"
url = "ws://127.0.0.1:18789"
token_env = "IXELMAT_GATEWAY_TOKEN"
session_key = "agent:hermes:main"
label = "Hermes Agent (OpenClaw)"
color = "yellow"


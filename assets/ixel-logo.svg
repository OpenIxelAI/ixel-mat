<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Moon gradient -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8f0f7;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#c8d8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7eb8d4;stop-opacity:0.8" />
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for stars -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8d4" />
      <stop offset="50%" style="stop-color:#9b7fc7" />
      <stop offset="100%" style="stop-color:#d4af37" />
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8d8e8" />
      <stop offset="50%" style="stop-color:#e8f0f7" />
      <stop offset="100%" style="stop-color:#9b7fc7" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#070b14" rx="20"/>

  <!-- Outer glow ring -->
  <circle cx="200" cy="185" r="115" fill="none" stroke="#7eb8d4" stroke-width="0.5" opacity="0.3" filter="url(#glow)"/>
  <circle cx="200" cy="185" r="125" fill="none" stroke="#9b7fc7" stroke-width="0.3" opacity="0.2"/>

  <!-- Full moon base -->
  <circle cx="200" cy="185" r="100" fill="url(#moonGlow)" filter="url(#glow)" opacity="0.95"/>

  <!-- Crescent shadow (creates crescent shape) -->
  <circle cx="230" cy="170" r="90" fill="#070b14"/>

  <!-- Crescent highlight rim -->
  <circle cx="200" cy="185" r="100" fill="none" stroke="#c8d8e8" stroke-width="1" opacity="0.6"/>

  <!-- Star cluster - main star (top right of crescent) -->
  <g filter="url(#starGlow)">
    <!-- Large star -->
    <polygon points="268,95 272,108 285,108 275,116 279,129 268,121 257,129 261,116 251,108 264,108"
             fill="#d4af37" opacity="0.95"/>
    <!-- Medium star -->
    <polygon points="300,145 303,153 311,153 305,158 307,166 300,161 293,166 295,158 289,153 297,153"
             fill="#e8f0f7" opacity="0.8"/>
    <!-- Small star -->
    <polygon points="255,60 257,67 264,67 259,71 261,78 255,74 249,78 251,71 246,67 253,67"
             fill="#c8d8e8" opacity="0.7"/>
    <!-- Tiny stars -->
    <circle cx="310" cy="100" r="2" fill="#d4af37" opacity="0.6"/>
    <circle cx="285" cy="70" r="1.5" fill="#c8d8e8" opacity="0.5"/>
    <circle cx="320" cy="130" r="1.5" fill="#9b7fc7" opacity="0.6"/>
    <circle cx="240" cy="80" r="1" fill="#7eb8d4" opacity="0.5"/>
  </g>

  <!-- Accent arc (rainbow goddess) -->
  <path d="M 105 220 Q 200 350 295 220"
        fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <path d="M 115 230 Q 200 345 285 230"
        fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- IXEL wordmark -->
  <text x="200" y="335"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="42"
        font-weight="300"
        letter-spacing="16"
        text-anchor="middle"
        fill="url(#textGrad)">IXEL</text>

  <!-- Tagline -->
  <text x="200" y="358"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9"
        font-weight="300"
        letter-spacing="5"
        text-anchor="middle"
        fill="#4a5568"
        opacity="0.8">TO SHINE</text>

  <!-- Subtle dot dividers on wordmark -->
  <circle cx="127" cy="348" r="1" fill="#d4af37" opacity="0.4"/>
  <circle cx="273" cy="348" r="1" fill="#d4af37" opacity="0.4"/>
</svg>
